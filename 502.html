<!DOCTYPE html>
<html lang="tr" id="root">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sizin için çalışıyoruz — Senstur</title>
  <style>
    @property --angle { syntax: '<angle>'; inherits: false; initial-value: 0deg; }

    :root {
      --gold: #d4af37;
      --gold-light: #f0c854;
      --coral: #ff5e3a;
      --violet: #8b5cf6;
      --cyan: #22d3ee;
      --ftc-bg: #f7f8fa;
      --ftc-text: #1a1a2e;
      --ftc-text-sub: rgba(26,26,46,0.6);
      --ftc-text-muted: rgba(26,26,46,0.38);
      --ftc-dot-color: rgba(0,0,0,0.04);
      --ftc-card-bg: rgba(255,255,255,0.82);
      --ftc-card-shadow: 0 24px 64px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
      --ftc-border-sub: rgba(0,0,0,0.05);
      --ftc-divider: rgba(0,0,0,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--ftc-bg);
      color: var(--ftc-text);
      padding: 2rem 1.25rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Dot grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, var(--ftc-dot-color) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Drift orbs (FTC hero gibi) ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 520px; height: 520px;
      top: -160px; left: -120px;
      background: radial-gradient(circle, rgba(212,175,55,0.13) 0%, transparent 70%);
      animation: drift1 18s ease-in-out infinite;
    }
    .orb-2 {
      width: 440px; height: 440px;
      bottom: -120px; right: -100px;
      background: radial-gradient(circle, rgba(255,94,58,0.1) 0%, transparent 70%);
      animation: drift2 22s ease-in-out infinite;
    }
    .orb-3 {
      width: 300px; height: 300px;
      top: 50%; left: 55%;
      background: radial-gradient(circle, rgba(139,92,246,0.07) 0%, transparent 70%);
      animation: drift3 16s ease-in-out infinite;
    }

    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(60px,-40px) scale(1.08); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0); }
      50%      { transform: translate(-70px,45px) scale(1.12); }
    }
    @keyframes drift3 {
      0%,100% { transform: translate(-50%,-50%) scale(1.04); }
      50%      { transform: translate(-50%,-50%) translate(35px,55px) scale(0.9); }
    }

    /* ── Card ── */
    @keyframes card-in {
      from { opacity: 0; transform: translateY(28px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--ftc-card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 28px;
      padding: 52px 36px 44px;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--ftc-card-shadow);
      border: 1px solid rgba(212,175,55,0.14);
      animation: card-in 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
      overflow: hidden;
    }

    /* Noise grain */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.022'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.6;
      mix-blend-mode: multiply;
      border-radius: inherit;
      z-index: 0;
    }

    /* Rotating conic border (top edge) */
    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(212,175,55,0.5) 40%, rgba(255,94,58,0.4) 60%, transparent 100%);
      z-index: 1;
    }

    /* ── Logo ── */
    .logo {
      display: block;
      height: 42px;
      width: auto;
      margin: 0 auto 32px;
      object-fit: contain;
      position: relative;
      z-index: 2;
    }

    /* ── Overline label (SectionHeader) ── */
    .label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      z-index: 2;
    }
    .label::before,
    .label::after {
      content: '';
      flex: 1;
      max-width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4));
    }
    .label::after { background: linear-gradient(270deg, transparent, rgba(212,175,55,0.4)); }

    /* ── Icon ── */
    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: 0.55; }
      100% { transform: scale(1.75); opacity: 0;   }
    }
    @keyframes icon-float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }

    .icon-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin: 0 auto 32px;
      z-index: 2;
    }
    .pulse-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1.5px solid rgba(212,175,55,0.5);
      animation: pulse-ring 2s ease-out infinite;
    }
    .pulse-ring:nth-child(2) { animation-delay: 0.8s; }

    .icon-circle {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(212,175,55,0.14) 0%, rgba(255,94,58,0.07) 100%);
      border: 1.5px solid rgba(212,175,55,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: icon-float 4s ease-in-out infinite;
    }

    /* Progress track inside icon circle */
    .icon-svg-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-svg-wrap svg.gear {
      width: 40px;
      height: 40px;
      color: var(--gold);
    }

    /* ── Title ── */
    @keyframes shimmer {
      0%   { background-position: -300% center; }
      100% { background-position:  300% center; }
    }

    .title {
      font-size: clamp(24px, 5vw, 32px);
      font-weight: 900;
      letter-spacing: -0.025em;
      line-height: 1.1;
      margin: 0 0 14px;
      background: linear-gradient(135deg, var(--ftc-text) 0%, var(--ftc-text) 35%, var(--gold) 55%, var(--coral) 75%, var(--ftc-text) 100%);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      position: relative;
      z-index: 2;
    }

    /* ── Description ── */
    .lead {
      font-size: 15px;
      line-height: 1.75;
      color: var(--ftc-text-sub);
      max-width: 360px;
      margin: 0 auto 28px;
      position: relative;
      z-index: 2;
    }

    /* ── Progress bar ── */
    @keyframes progress-scan {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    .progress-wrap {
      position: relative;
      z-index: 2;
      margin-bottom: 28px;
    }
    .progress-track {
      height: 3px;
      background: rgba(212,175,55,0.12);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 28%;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--coral), transparent);
      animation: progress-scan 2.2s ease-in-out infinite;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--ftc-divider), transparent);
      margin: 0 0 24px;
      position: relative;
      z-index: 2;
    }

    /* ── Bottom meta ── */
    .meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: relative;
      z-index: 2;
    }

    .hint {
      font-size: 12px;
      color: var(--ftc-text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .hint svg { opacity: 0.5; flex-shrink: 0; }

    .dot-sep {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--ftc-text-muted);
      opacity: 0.3;
      flex-shrink: 0;
    }

    .countdown {
      font-size: 12px;
      color: var(--ftc-text-muted);
      font-variant-numeric: tabular-nums;
    }
    .countdown strong {
      color: var(--gold);
      font-weight: 700;
    }
  </style>
</head>
